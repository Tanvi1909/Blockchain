<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<section class="home">

    <div class="glass">

        <h1>Admin Portal</h1>

        <p>Blockchain Election Management System</p>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form method="POST">

            <input
                type="text"
                name="username"
                placeholder="Admin Username"
                required
            >

            <input
                type="password"
                name="password"
                placeholder="Admin Password"
                required
            >

            <button type="submit">
                Login to Dashboard
            </button>

        </form>

        <br>

        <a href="/">
            <button>
                Back to Home
            </button>
        </a>

    </div>

</section>

</body>
</html>
